<div>
    <h1>Employee List Component</h1>
    <button (click)="fun()">Click</button>
    <br />
    <!-- <p [hidden]="isYes">Name1: {{employees[0].name}} </p> -->
    <!-- <div *ngIf="isYes">Name 1: {{employees[0].name}}</div> -->
    <div *ngIf="isYes; else elseBlock">Name 1: {{employees[0].name}}</div>
    <div>
        <ng-template #elseBlock>Name 2: {{employees[1].name}}</ng-template>
    </div>
    <!-- @ngIf -->
    <div>
        @if (isYes) {
        {{ employees[0].name }}
        } @else  {
        {{ employees[1].name }}
        }
    </div>
    <div>
        <h3>List of employees</h3>
        @for (emp of employees; track emp.id) {
        <p>{{emp.id}} {{emp.name}} {{emp.salary}}</p>
        }
    </div>



</div>
