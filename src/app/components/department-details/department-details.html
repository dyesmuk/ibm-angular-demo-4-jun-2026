<div>
    <h1>Department Details Component (Child)</h1>
    <h3>Receive data from parent (automatically)</h3>
        <p>Department data: {{ dataFromDept }}</p>
        <p>Department data2: {{ dataFromDept2() }}</p>

    <p>childData: {{childData}}</p>
    <p>childData2: {{childData2}}</p>

    <button (click)="sendData()" >Send</button>


</div>
